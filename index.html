<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>整蛊互动游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 主容器 -->
    <div class="container">
        
        <!-- 初始状态：显示问题和按钮 -->
        <div id="initial" class="section active">
            <h1>你是傻狗么</h1>
            <img src="https://img1.baidu.com/it/u=3300771281,1355526077&fm=253&fmt=auto&app=138&f=JPEG?w=500&h=500">
            <div class="buttons">
                <button onclick="showResult('believe')" class="btn btn-primary">是</button>
                <button onclick="showResult('disbelieve')" class="btn btn-secondary">不是</button>
            </div>
        </div>

        <!-- 选择相信后的结果 -->
        <div id="believe" class="section result">
            <h1>你才知道你是傻狗？</h1>
            <img src="https://img0.baidu.com/it/u=2936038661,286362352&fm=253&fmt=auto&app=138&f=JPEG?w=578&h=500">
            <p class="result-text">哈哈哈哈哈哈哈哈哈</p>
            <button onclick="reset()" class="btn btn-back">重新开始</button>
        </div>

        <!-- 选择不相信后的结果 -->
        <div id="disbelieve" class="section result">
            <h1>我是皇帝，我说你是你就是</h1>
            <img src="https://q8.itc.cn/q_70/images03/20240307/f61687de03ca4235aefb857f6e95f471.jpeg">
            <p class="result-text">嘿嘿嘿嘿嘿嘿</p>
            <button onclick="reset()" class="btn btn-back">重新开始</button>
        </div>

    </div>

    <script>
        // 显示结果函数：隐藏初始界面，显示对应结果
        function showResult(type) {
            // 隐藏初始界面
            document.getElementById('initial').classList.remove('active');
            // 显示对应结果
            document.getElementById(type).classList.add('active');
        }

        // 重置函数：返回初始状态
        function reset() {
            // 隐藏所有结果
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            // 显示初始界面
            document.getElementById('initial').classList.add('active');
        }
    </script>
</body>
</html>
