<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>整蛊互动游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 主容器 -->
    <div class="container">
        
        <!-- 初始状态：显示问题和按钮 -->
        <div id="initial" class="section active">
            <h1>你相信这个世界上有鬼吗？</h1>
            <img src="https://img.freepik.com/free-vector/mystery-little-girl-searching-something_23-2148482469.jpg?w=400" alt="神秘" class="main-img">
            <div class="buttons">
                <button onclick="showResult('believe')" class="btn btn-primary">相信</button>
                <button onclick="showResult('disbelieve')" class="btn btn-secondary">不相信</button>
            </div>
        </div>

        <!-- 选择相信后的结果 -->
        <div id="believe" class="section result">
            <h1>哈哈！被骗了吧～</h1>
            <img src="https://img.freepik.com/free-vector/cute-animal-characters-holding-question-mark_23-2148476492.jpg?w=400" alt="整蛊" class="main-img">
            <p class="result-text">其实这个世界上根本没有鬼！刚才是不是被吓到了？哈哈哈～</p>
            <button onclick="reset()" class="btn btn-back">重新开始</button>
        </div>

        <!-- 选择不相信后的结果 -->
        <div id="disbelieve" class="section result">
            <h1>真的吗？</h1>
            <img src="https://img.freepik.com/free-vector/scary-ghost-halloween_23-2147527645.jpg?w=400" alt="吓人" class="main-img">
            <p class="result-text">那你今晚一个人关灯睡觉试试？嘿嘿嘿～</p>
            <button onclick="reset()" class="btn btn-back">重新开始</button>
        </div>

    </div>

    <script>
        // 显示结果函数：隐藏初始界面，显示对应结果
        function showResult(type) {
            // 隐藏初始界面
            document.getElementById('initial').classList.remove('active');
            // 显示对应结果
            document.getElementById(type).classList.add('active');
        }

        // 重置函数：返回初始状态
        function reset() {
            // 隐藏所有结果
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            // 显示初始界面
            document.getElementById('initial').classList.add('active');
        }
    </script>
</body>
</html>
